<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Oferente - Dashboard</title>

</head>
<body>

<div class="navegador">
    <div>
        <strong>Bolsa de Empleo</strong>
        <a href="/oferente/dashboard">Dashboard</a>
        <a href="/oferente/habilidades">Mis habilidades</a>
        <a href="/oferente/cv">Mi CV</a>
    </div>

    <div>
        <span th:text="${#httpServletRequest.remoteUser}"></span>
        <a href="/logout">Salir</a>
    </div>
</div>

<!-- Contenido -->
<div class="container">
    <h1>Oferente - Dashboard</h1>
    <p>Administra tus habilidades y tu CV.</p>

    <div class="buttons">
        <a href="/oferente/habilidades" class="btn">Mis habilidades</a>
        <a href="/oferente/cv" class="btn">Mi CV</a>
    </div>

    <h2>Datos del Oferente</h2>

    <table>
        <tr>
            <th>ID</th>
            <th>Nombre</th>
            <th>Apellidos</th>
            <th>Nacionalidad</th>
            <th>Teléfono</th>
            <th>Correo</th>
            <th>Residencia</th>
        </tr>

        <tr th:each="o : ${oferentes}">
            <td th:text="${o.id}"></td>
            <td th:text="${o.nombre}"></td>
            <td th:text="${o.apellidos}"></td>
            <td th:text="${o.nacionalidad}"></td>
            <td th:text="${o.telefono}"></td>
            <td th:text="${o.correoPersonal}"></td>
            <td th:text="${o.residencia}"></td>
        </tr>
    </table>
</div>

<!-- Footer -->
<div class="footer">
    Bolsa de Empleo - Proyecto
</div>

</body>
</html>
