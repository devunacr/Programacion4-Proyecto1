<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${puesto.titulo}">Detalle del Puesto</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<header th:replace="~{fragments/layout :: header}"></header>

<main>
    <a th:href="@{/}" style="font-size:0.9rem">← Volver al inicio</a>

    <div style="background:#fff; border:1px solid #ccc; padding:24px; margin-top:16px">
        <h2 th:text="${puesto.titulo}" style="margin-bottom:12px"></h2>

        <p><strong>Empresa:</strong> <span th:text="${puesto.empresa.nombre}"></span></p>
        <p><strong>Salario:</strong> ₡<span th:text="${puesto.salario}"></span></p>
        <p><strong>Tipo:</strong> <span th:text="${puesto.tipoPublicacion}"></span></p>
        <p style="margin-top:12px" th:text="${puesto.descripcion}"></p>

        <div th:if="${!#lists.isEmpty(puesto.habilidades)}" style="margin-top:16px">
            <p class="section-title">Habilidades requeridas</p>
            <table>
                <thead>
                <tr>
                    <th>Habilidad</th>
                    <th>Nivel mínimo</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="h : ${puesto.habilidades}">
                    <td th:text="${h.caracteristica.nombre}"></td>
                    <td th:text="${h.nivel}"></td>
                </tr>
                </tbody>
            </table>
        </div>

        <!-- 🔥 BOTÓN DE APLICAR -->
        <div style="margin-top:20px">

            <!-- SI ES OFERENTE -->
            <div th:if="${session.oferenteId != null}">
                <form th:action="@{/oferente/aplicar}" method="post" enctype="multipart/form-data">
                    <input type="hidden" name="puestoId" th:value="${puesto.id}">

                    <label>Subir CV (PDF)</label><br>
                    <input type="file" name="cv" accept=".pdf" required>

                    <br><br>
                    <button type="submit" class="btn btn-primary">Aplicar</button>
                </form>
            </div>

            <!-- SI NO ESTÁ LOGUEADO COMO OFERENTE -->
            <div th:if="${session.oferenteId == null}">
                <p class="alert alert-info">
                    Debes iniciar sesión como oferente para aplicar.
                </p>
            </div>

        </div>

    </div>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>

</body>
</html>
