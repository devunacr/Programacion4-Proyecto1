<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Iniciar Sesión</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body style="background-color: #f4f8fb;">
<header th:replace="~{fragments/header :: header}"></header>

<div class="auth-container">
    <div class="auth-card">
        <h2>Iniciar Sesión</h2>
        <p style="color: #64748b; margin-bottom: 25px;">Ingresa a tu cuenta para acceder al sistema</p>

        <div th:if="${mensajeError}" class="error-alert">
            <span>ⓘ</span>
            <p th:text="${mensajeError}"></p>
        </div>

        <div class="role-tabs">
            <a th:href="@{/login(rol='Oferente')}"
               th:classappend="${#strings.equals(rolSeleccionado, 'Oferente')} ? 'active'">Oferente</a>
            <a th:href="@{/login(rol='Empresa')}"
               th:classappend="${#strings.equals(rolSeleccionado, 'Empresa')} ? 'active'">Empresa</a>
            <a th:href="@{/login(rol='Admin')}"
               th:classappend="${#strings.equals(rolSeleccionado, 'Admin')} ? 'active'">Admin</a>
        </div>

        <form th:action="@{/login}" method="post" style="text-align: left;">
            <input type="hidden" name="rol" th:value="${rolSeleccionado}">

            <div class="form-group">
                <label>Correo Electrónico *</label>
                <input type="email" name="username" required placeholder="ejemplo@correo.com" class="filter-input" style="margin-bottom: 20px;">

                <label>Contraseña *</label>
                <input type="password" name="password" required placeholder="••••••••" class="filter-input" style="margin-bottom: 25px;">

                <button type="submit" class="btn-black-full">
                    Ingresar como <span th:text="${rolSeleccionado}"></span>
                </button>
            </div>
        </form>

        <div style="margin-top: 25px; font-size: 0.9rem;">
            <p th:if="${rolSeleccionado == 'Oferente'}">¿No tienes cuenta? <a th:href="@{/registro/oferente}" style="color: var(--accent-celeste); text-decoration: none; font-weight: 600;">Regístrate aquí</a></p>
            <p th:if="${rolSeleccionado == 'Empresa'}">¿Tu empresa no está registrada? <a th:href="@{/registro/empresa}" style="color: var(--accent-celeste); text-decoration: none; font-weight: 600;">Regístrate aquí</a></p>
            <p th:if="${rolSeleccionado == 'Admin'}" style="color: #64748b; font-size: 0.9rem;">Los administradores no pueden registrarse públicamente.</p>
        </div>
    </div>
</div>
</body>
</html>
