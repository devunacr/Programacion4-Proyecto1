<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Registro Oferente</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<header th:replace="~{fragments/header :: header}"></header>

<div class="auth-container">
    <div class="auth-card-wide">
        <h2>Registrar Oferente</h2>
        <p style="margin-bottom: 30px; color: #64748b;">Completa el formulario para crear tu perfil profesional</p>

        <form th:action="@{/registro/oferente}" th:object="${oferente}" method="post" class="grid-form">
            <div class="form-group">
                <label>Identificación *</label>
                <input type="text" th:field="*{identificacion}" required>
            </div>
            <div class="form-group">
                <label>Nombre *</label>
                <input type="text" th:field="*{nombre}" required>
            </div>
            <div class="form-group">
                <label>Apellidos *</label>
                <input type="text" th:field="*{apellidos}" required>
            </div>
            <div class="form-group">
                <label>Correo Electrónico *</label>
                <input type="email" th:field="*{correo}" required>
            </div>
            <div class="form-group full-width">
                <label>Contraseña *</label>
                <input type="password" th:field="*{password}" required>
            </div>
            <div class="full-width">
                <button type="submit" class="btn-black-full">Registrar Oferente</button>
            </div>
        </form>

        <p style="margin-top: 25px; text-align: center;">¿Ya tienes cuenta? <a th:href="@{/login(rol='oferente')}">Inicia sesión aquí</a></p>

        <div class="info-note">
            <p><strong>Nota:</strong> Tu perfil profesional estará disponible para las empresas una vez que un administrador valide tus datos.</p>
        </div>
    </div>
</div>
</body>
</html>
