<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Empresa</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/dashboard/dashEmpresaStyle.css}">
</head>
<body>

<header th:replace="~{fragments/layout :: header}"></header>

<main>
    <div class="top-actions">
        <a th:href="@{/empresa/logout}" class="btn btn-secondary logout-btn">Cerrar sesión</a>
    </div>

    <div th:replace="~{fragments/layout :: alertas}"></div>

    <div class="dash-nav">
        <a th:href="@{/empresa/dashboard}">Mis puestos</a>
        <a th:href="@{/empresa/puesto/nuevo}">Publicar puesto</a>
    </div>

    <p class="section-title">Bienvenida, <span th:text="${empresa.nombre}"></span></p>

    <p class="section-title">Mis Puestos</p>

    <div th:if="${#lists.isEmpty(puestos)}">
        <p class="alert alert-info">No has publicado puestos aún. <a th:href="@{/empresa/puesto/nuevo}">Publicar ahora</a></p>
    </div>

    <table th:if="${!#lists.isEmpty(puestos)}">
        <thead>
            <tr>
                <th>ID</th>
                <th>Título</th>
                <th>Salario</th>
                <th>Tipo</th>
                <th>Activo</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="puesto : ${puestos}">
                <td th:text="${puesto.id}"></td>
                <td th:text="${puesto.titulo}"></td>
                <td th:text="'₡' + ${puesto.salario}"></td>
                <td th:text="${puesto.tipoPublicacion}"></td>
                <td th:text="${puesto.activo} ? 'Sí' : 'No'"></td>
                <td>
                    <form th:if="${puesto.activo}" th:action="@{/empresa/puesto/desactivar/{id}(id=${puesto.id})}"
                          method="post" style="display:inline">
                        <button type="submit" class="btn btn-danger">Desactivar</button>
                    </form>
                    <a th:href="@{/empresa/puesto/candidatos/{id}(id=${puesto.id})}" class="btn btn-success">Candidatos</a>

                    <form th:if="${!puesto.activo}"
                          th:action="@{/empresa/puesto/activar/{id}(id=${puesto.id})}"
                          method="post" style="display:inline">
                        <button type="submit" class="btn btn-primary">Activar</button>
                    </form>
                </td>
            </tr>
        </tbody>
    </table>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>

</body>
</html>
