<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Candidatos</title>
    <link rel="stylesheet" th:href="@{/style.css}">
</head>
<body>

<header th:replace="~{fragments/layout :: header}"></header>

<main>
    <div th:replace="~{fragments/layout :: alertas}"></div>

    <div class="dash-nav">
        <a th:href="@{/empresa/dashboard}">← Volver al dashboard</a>
    </div>

    <p class="section-title">Candidatos para: <span th:text="${puesto.titulo}"></span></p>

    <div th:if="${#lists.isEmpty(candidatos)}">
        <p class="alert alert-info">No se encontraron candidatos que coincidan con las habilidades requeridas.</p>
    </div>

    <table th:if="${!#lists.isEmpty(candidatos)}">
        <thead>
            <tr>
                <th>Nombre</th>
                <th>Correo</th>
                <th>Residencia</th>
                <th>Coincidencia</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="c : ${candidatos}">
                <td th:text="${c.nombre + ' ' + c.apellidos}"></td>
                <td th:text="${c.correopersonal}"></td>
                <td th:text="${c.residencia}"></td>
                <td th:text="${c.porcentajeCoincidencia + '%'}"></td>
            </tr>
        </tbody>
    </table>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>

</body>
</html>
