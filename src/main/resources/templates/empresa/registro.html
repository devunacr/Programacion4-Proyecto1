<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Registro de Empresa</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/registroStyle.css}">
</head>
<body>

<header th:replace="~{fragments/layout :: header}"></header>

<main>
    <div th:replace="~{fragments/layout :: alertas}"></div>

    <div class="form-card">
        <h2>Registro de Empresa</h2>
        <form th:action="@{/empresa/registro}" method="post" th:object="${empresaDTO}">
            <div class="form-group">
                <label>Nombre</label>
                <input type="text" th:field="*{nombre}" required>
                <span th:if="${#fields.hasErrors('nombre')}" th:errors="*{nombre}" style="color:red;font-size:0.85rem"></span>
            </div>
            <div class="form-group">
                <label>Dirección</label>
                <input type="text" name="direccion" required>
            </div>
            <div class="form-group">
                <label>Correo</label>
                <input type="email" th:field="*{correo}" required>
                <span th:if="${#fields.hasErrors('correo')}" th:errors="*{correo}" style="color:red;font-size:0.85rem"></span>
            </div>
            <div class="form-group">
                <label>Teléfono</label>
                <input type="text" th:field="*{telefono}" required>
                <span th:if="${#fields.hasErrors('telefono')}" th:errors="*{telefono}" style="color:red;font-size:0.85rem"></span>
            </div>
            <div class="form-group">
                <label>Descripción</label>
                <textarea th:field="*{descripcion}"></textarea>
            </div>
            <div class="form-group">
                <label>Contraseña</label>
                <input type="password" th:field="*{password}" required>
                <span th:if="${#fields.hasErrors('password')}" th:errors="*{password}" style="color:red;font-size:0.85rem"></span>
            </div>
            <button type="submit" class="btn btn-registro">Registrar</button>
            <a th:href="@{/empresa/login}" style="margin-left:12px">¿Ya tienes cuenta? Entrar</a>
        </form>
    </div>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>

</body>
</html>
