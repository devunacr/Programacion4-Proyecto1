<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Error</title>
    <link rel="stylesheet" th:href="@{/style.css}">
</head>
<body>

<header th:replace="~{fragments/layout :: header}"></header>

<main style="text-align:center; padding-top:48px">
    <p style="font-size:3rem; color:#922b21">404</p>
    <h2 th:text="${titulo}" style="margin:12px 0 8px; color:#922b21">Error</h2>
    <p th:text="${mensaje}" style="color:#555; margin-bottom:24px">Ha ocurrido un error.</p>
    <a th:href="@{/}" class="btn btn-primary">Volver al inicio</a>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>

</body>
</html>
