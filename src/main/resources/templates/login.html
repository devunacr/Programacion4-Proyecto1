<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="'Iniciar sesión - ' + ${rol}">Iniciar sesión</title>
    <link rel="stylesheet" th:href="@{/style.css}">
    <link rel="stylesheet" th:href="@{/loginStyle.css}">
</head>
<body>

<header th:replace="~{fragments/layout :: header}"></header>

<main>
    <div th:replace="~{fragments/layout :: alertas}"></div>

    <div class="form-card">
        <h2 th:text="'Acceso ' + ${rol}">Acceso</h2>
        <form th:action="${accion}" method="post">
            <div class="form-group">
                <label th:text="${labelUsuario}">Usuario</label>
                <input type="text" name="usuario" required>
            </div>
            <div class="form-group">
                <label>Contraseña</label>
                <input type="password" name="password" required>
            </div>
            <button type="submit" class="btn btn-primary">Entrar</button>
            <a th:if="${linkRegistro}" th:href="${linkRegistro}" style="margin-left:12px" th:text="${textoRegistro}"></a>
        </form>
    </div>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>

</body>
</html>
