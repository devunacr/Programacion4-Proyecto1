<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><title>Oferentes</title></head>
<body>
<h2>Lista de Oferentes</h2>
<table>
    <tr>
        <th>ID</th>
        <th>Nombre</th>
        <th>Apellidos</th>
        <th>Nacionalidad</th>
        <th>Teléfono</th>
        <th>Correo</th>
        <th>Residencia</th>
    </tr>
    <tr th:each="o : ${oferentes}">
        <td th:text="${o.id}"></td>
        <td th:text="${o.nombre}"></td>
        <td th:text="${o.apellidos}"></td>
        <td th:text="${o.nacionalidad}"></td>
        <td th:text="${o.telefono}"></td>
        <td th:text="${o.correoPersonal}"></td>
        <td th:text="${o.residencia}"></td>
    </tr>
</table>
</body>
</html>
